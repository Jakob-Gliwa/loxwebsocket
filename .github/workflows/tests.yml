name: tests

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python is >=3.10 (see pyproject.toml).
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        # setup-uv v8 ships immutable releases with no moving major tag, so
        # pin the exact version instead of @v8.
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install (builds the Cython extractor)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[test]"

      - name: Run tests (skip live)
        run: uv run pytest -m "not live"

  lint-type:
    name: ruff + mypy gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (type check)
        run: uv run mypy src/loxwebsocket
