name: Build & Publish to TestPyPI

on:
  # Only run after the "tests" workflow has finished on main; the build job
  # below then gates on its success. Manual dispatch stays available.
  workflow_run:
    workflows: ["tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write        # für OIDC-Upload

# Cancel superseded TestPyPI runs on the same ref to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Publish only when triggered manually, or when the upstream tests passed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        # One native runner per target arch (no QEMU). ubuntu-24.04-arm builds
        # aarch64 wheels natively instead of emulated, which is far faster.
        os:
          - ubuntu-latest      # Linux x86_64
          - ubuntu-24.04-arm   # Linux aarch64 (native)
          - windows-latest     # Windows AMD64
          - macos-15-intel     # macOS x86_64
          - macos-14           # macOS arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          # Build the exact commit that passed tests (workflow_run context);
          # falls back to the default ref on manual dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}

      # Derive the TestPyPI version from the real pyproject.toml version and
      # append a unique dev suffix (e.g. 0.6.0 -> 0.6.0.dev42). Dev releases
      # sort before the final release and are only installed with --pre, so
      # they never shadow a real PyPI release.
      - name: Set dynamic version for TestPyPI
        shell: bash
        run: |
          python - <<'PY'
          import re, pathlib, os, sys
          p = pathlib.Path('pyproject.toml')
          s = p.read_text(encoding='utf-8')
          m = re.search(r'(?m)^version\s*=\s*"([^"]+)"$', s)
          if not m:
              print('No version line found in pyproject.toml'); sys.exit(1)
          base = m.group(1)
          v = f"{base}.dev{os.environ['GITHUB_RUN_NUMBER']}"
          s_new = re.sub(r'(?m)^version\s*=\s*".*"$', f'version = "{v}"', s, count=1)
          p.write_text(s_new, encoding='utf-8')
          print('Set version to', v)
          PY

      - run: pip install --upgrade build cibuildwheel

      # build[uv] braucht uv im PATH auf macOS/Windows; im Linux-Container
      # stellt cibuildwheel uv selbst bereit.
      - name: Install uv (non-Linux)
        if: runner.os != 'Linux'
        uses: astral-sh/setup-uv@v8.2.0

      # sdist nur einmal (auf dem x86_64-Linux-Runner) erstellen
      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        run: python -m build --sdist --outdir dist

      # Wheels für alle CPython-Versionen (cibuildwheel filtert automatisch
      # anhand von requires-python >= 3.10; PyPy ist in cibuildwheel 4.x nicht
      # aktiviert, daher kein CIBW_SKIP nötig). Jeder Runner baut nur seine
      # native Arch (CIBW_ARCHS = "auto"), daher ist kein QEMU nötig.
      - name: Build wheels
        env:
          CIBW_BUILD: "cp3*-*"        # alle 3.x
          CIBW_BUILD_FRONTEND: "build[uv]"   # schnellere isolierte Build-Envs via uv
        run: cibuildwheel --output-dir dist

      - uses: actions/upload-artifact@v7      # pro Runner eigene Artefakte
        with:
          name: python-package-${{ matrix.os }}-${{ runner.arch }}
          path: dist/

  publish-to-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/loxwebsocket

    steps:
      # alle Artefakte einsammeln
      - uses: actions/download-artifact@v8
        with:
          pattern: python-package-*
          path: artifacts/

      # alles in einen dist/-Ordner kopieren
      - name: Collect distributions
        run: |
          mkdir -p dist
          find artifacts -name '*.whl'  -exec cp {} dist/ \;
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          echo "Collected distributions:"
          ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          # Re-runs reuse the same run number -> same version. Skip already
          # uploaded files instead of failing with HTTP 400.
          skip-existing: true
          verbose: true