name: Build & Publish to PyPI

on:
  release:
    types: [published]   # run only when a GitHub Release is published
  workflow_dispatch:      # allow manual trigger with explicit tag
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write        # for PyPI trusted publishing (OIDC)

# Serialize releases per ref but never abort an in-flight publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # One native runner per target arch (no QEMU). ubuntu-24.04-arm builds
        # aarch64 wheels natively instead of emulated, which is far faster.
        os:
          - ubuntu-latest      # Linux x86_64
          - ubuntu-24.04-arm   # Linux aarch64 (native)
          - windows-latest     # Windows AMD64
          - macos-15-intel     # macOS x86_64
          - macos-14           # macOS arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with: {persist-credentials: false}

      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}

      - run: pip install --upgrade build cibuildwheel

      # build[uv] needs uv on PATH on macOS/Windows; inside the Linux
      # container cibuildwheel provisions uv itself.
      - name: Install uv (non-Linux)
        if: runner.os != 'Linux'
        uses: astral-sh/setup-uv@v8.2.0

      # sdist only once (on the x86_64 Linux runner)
      - name: Build sdist
        if: matrix.os == 'ubuntu-latest'
        run: python -m build --sdist --outdir dist

      # Build wheels for all CPython versions (cibuildwheel filters by
      # requires-python >= 3.10 automatically; PyPy isn't enabled in
      # cibuildwheel 4.x, so no CIBW_SKIP is needed). Each runner builds only
      # its native arch (CIBW_ARCHS defaults to "auto"), so no QEMU is needed.
      - name: Build wheels
        env:
          CIBW_BUILD: "cp3*-*"        # all 3.x
          CIBW_BUILD_FRONTEND: "build[uv]"   # faster isolated build envs via uv
        run: cibuildwheel --output-dir dist

      - uses: actions/upload-artifact@v7
        with:
          name: python-package-${{ matrix.os }}-${{ runner.arch }}
          path: dist/

  publish-to-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/loxwebsocket

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}

      # Ensure tag version matches project.version in pyproject.toml
      - name: Verify version matches tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
        shell: bash
        run: |
          TAG="$RELEASE_TAG"
          TAG_NO_V="${TAG#v}"
          echo "Tag: $TAG  Parsed: $TAG_NO_V"
          export TAG_NO_V
          python - <<'PY'
          import tomllib, pathlib, sys, os
          ver = tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version']
          print('pyproject version:', ver)
          tag = os.environ.get('TAG_NO_V')
          print('tag version      :', tag)
          sys.exit(0 if ver == tag else 1)
          PY

      # Collect all built distributions from matrix jobs
      - uses: actions/download-artifact@v8
        with:
          pattern: python-package-*
          path: artifacts/

      - name: Collect distributions
        run: |
          mkdir -p dist
          find artifacts -name '*.whl'    -exec cp {} dist/ \;
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          echo "Collected distributions:"
          ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true


